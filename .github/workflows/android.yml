name: Build Android APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Install root workspace dependencies
      run: npm install

    - name: Install frontend dependencies
      run: npm install --prefix frontend

    - name: Install Node.js service dependencies
      run: npm install --prefix node-project

    - name: Compile React web app
      run: |
        chmod +x frontend/node_modules/.bin/vite
        npm run build --prefix frontend

    - name: Sync Capacitor project assets
      run: |
        chmod +x node_modules/.bin/cap
        npx cap sync

    - name: Build Android Debug APK
      run: |
        cd android
        sed -i 's/\r$//' gradlew
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CallOfSSH-Android-Debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
